name: Hourly Auto Renew

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  auto-renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check expired accounts and renew VIP
        env:
          BASE_URL: https://kugou.supersb.me
          CRON_SECRET: ${{ secrets.AUTO_KUGOU_CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$BASE_URL/api/vip/cron/sign-in" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
